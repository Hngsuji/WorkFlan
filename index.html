<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>워크플랜</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,'Noto Sans KR',sans-serif;background:#eef2f7;color:#111}.app{max-width:430px;min-height:100vh;margin:0 auto;background:#f8fafc;padding-bottom:80px}.top{background:#fff;padding:22px 20px;border-bottom:1px solid #ddd}.top h1{font-size:28px}.top p{color:#777;margin-top:4px}.summary{margin:18px 20px;background:#2563eb;color:#fff;border-radius:24px;padding:24px}.summary small{opacity:.85}.summary h2{font-size:38px;margin-top:6px}.section{padding:0 20px 18px}.section-title{font-size:20px;font-weight:800;margin:22px 0 12px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 5px 14px rgba(0,0,0,.04)}.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.name{font-weight:800}.sub{font-size:13px;color:#777;margin-top:4px}.money{font-weight:900}.dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:8px}.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(430px,100%);height:70px;background:#fff;border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(4,1fr)}.tab{border:0;background:#fff;color:#777;font-weight:800}.tab.active{color:#2563eb}.fab{position:fixed;bottom:88px;right:calc(50% - 195px);width:58px;height:58px;border-radius:50%;border:0;background:#f97316;color:#fff;font-size:34px;box-shadow:0 10px 25px rgba(249,115,22,.35)}@media(max-width:430px){.fab{right:20px}}.calendar{margin:18px 20px;background:#fff;border-radius:20px;overflow:hidden;border:1px solid #ddd}.week,.days{display:grid;grid-template-columns:repeat(7,1fr)}.week div{text-align:center;padding:10px 0;font-weight:800;color:#777;border-bottom:1px solid #eee}.day{min-height:72px;border-right:1px solid #eee;border-bottom:1px solid #eee;padding:6px;font-size:12px}.day:nth-child(7n){border-right:0}.day-num{font-weight:800;margin-bottom:4px}.pill{color:#fff;border-radius:6px;padding:2px 4px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:flex-end;justify-content:center}.modal.show{display:flex}.sheet{width:min(430px,100%);background:#f8fafc;border-radius:24px 24px 0 0;max-height:92vh;overflow:auto}.sheet-head{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:18px 20px;border-bottom:1px solid #ddd}.close{width:36px;height:36px;border-radius:50%;border:0;background:#eee;font-size:20px}.form{padding:20px}.field{margin-bottom:14px}.field label{display:block;font-weight:800;font-size:13px;color:#666;margin-bottom:7px}.field input,.field select{width:100%;padding:13px;border:1px solid #ddd;border-radius:14px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{width:100%;padding:14px;border:0;border-radius:14px;background:#2563eb;color:#fff;font-weight:900}.btn.gray{background:#e5e7eb;color:#333}.btn.red{background:#fee2e2;color:#dc2626}.empty{text-align:center;color:#999;padding:30px 0;font-weight:800}.color-list{display:flex;gap:8px}.color{width:34px;height:34px;border-radius:50%;border:3px solid transparent}.color.on{border-color:#111}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>워크플랜</h1>
      <p id="monthText">일정과 급여를 한 번에</p>
    </div>
    <main id="view"></main>
    <button class="fab" onclick="openAddWork()">+</button>
    <div class="tabs">
      <button class="tab active" id="tab-home" onclick="go('home')">홈</button>
      <button class="tab" id="tab-calendar" onclick="go('calendar')">달력</button>
      <button class="tab" id="tab-pay" onclick="go('pay')">정산</button>
      <button class="tab" id="tab-targets" onclick="go('targets')">대상</button>
    </div>
  </div>

  <div class="modal" id="targetModal">
    <div class="sheet">
      <div class="sheet-head"><h2>대상 추가</h2><button class="close" onclick="closeModal('targetModal')">×</button></div>
      <form class="form" onsubmit="saveTarget(event)">
        <div class="field"><label>이름</label><input id="targetName" placeholder="예: 뚜레쥬르 / 김알바" required></div>
        <div class="field"><label>시급</label><input id="targetWage" type="number" placeholder="예: 10320" required></div>
        <div class="field"><label>급여일</label><input id="targetPayday" type="number" min="1" max="31" placeholder="예: 10"></div>
        <div class="field"><label>색상</label><div class="color-list" id="colors"></div></div>
        <button class="btn">저장</button>
      </form>
    </div>
  </div>

  <div class="modal" id="workModal">
    <div class="sheet">
      <div class="sheet-head"><h2>근무 추가</h2><button class="close" onclick="closeModal('workModal')">×</button></div>
      <form class="form" onsubmit="saveWork(event)">
        <div class="field"><label>대상</label><select id="workTarget" required></select></div>
        <div class="field"><label>날짜</label><input id="workDate" type="date" required></div>
        <div class="two">
          <div class="field"><label>시작</label><input id="workStart" type="time" value="09:00" required></div>
          <div class="field"><label>종료</label><input id="workEnd" type="time" value="18:00" required></div>
        </div>
        <div class="two">
          <div class="field"><label>휴게시간(분)</label><input id="workBreak" type="number" value="60"></div>
          <div class="field"><label>시급</label><input id="workWage" type="number" required></div>
        </div>
        <button class="btn">저장</button>
      </form>
    </div>
  </div>

<script>
var page='home';
var now=new Date();
now.setDate(1);
var colorOptions=['#f97316','#0ea5e9','#22c55e','#8b5cf6','#ef4444'];
var selectedColor=colorOptions[0];
var targets=[];
var works=[];

function id(){return 'id'+Date.now()+Math.floor(Math.random()*100000)}
function load(){
  try{targets=JSON.parse(localStorage.getItem('wp_targets')||'[]')}catch(e){targets=[]}
  try{works=JSON.parse(localStorage.getItem('wp_works')||'[]')}catch(e){works=[]}
  if(targets.length===0){
    targets=[{id:id(),name:'뚜레쥬르',wage:10320,payday:30,color:'#f97316'},{id:id(),name:'국가근로',wage:10320,payday:15,color:'#0ea5e9'}];
    save();
  }
}
function save(){localStorage.setItem('wp_targets',JSON.stringify(targets));localStorage.setItem('wp_works',JSON.stringify(works))}
function $(x){return document.getElementById(x)}
function won(n){return Math.round(n).toLocaleString('ko-KR')+'원'}
function ym(){return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')}
function dstr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getTarget(tid){return targets.find(function(t){return t.id===tid})}
function minDiff(s,e){var a=s.split(':'),b=e.split(':');var x=Number(a[0])*60+Number(a[1]);var y=Number(b[0])*60+Number(b[1]);if(y<x)y+=1440;return y-x}
function pay(w){return Math.max(0,minDiff(w.start,w.end)-Number(w.breakMin||0))/60*Number(w.wage||0)}
function monthWorks(){return works.filter(function(w){return w.date.indexOf(ym())===0})}
function total(list){return list.reduce(function(a,w){return a+pay(w)},0)}
function hours(list){return list.reduce(function(a,w){return a+Math.max(0,minDiff(w.start,w.end)-Number(w.breakMin||0))/60},0)}
function targetWorks(tid){return monthWorks().filter(function(w){return w.targetId===tid})}

function go(p){page=p;render()}
function renderTabs(){['home','calendar','pay','targets'].forEach(function(t){$('tab-'+t).className='tab '+(page===t?'active':'')})}
function render(){
  renderTabs();
  $('monthText').innerText=now.getFullYear()+'년 '+(now.getMonth()+1)+'월';
  if(page==='home')renderHome();
  if(page==='calendar')renderCalendar();
  if(page==='pay')renderPay();
  if(page==='targets')renderTargets();
}
function renderHome(){
  var mw=monthWorks();
  var html='<section class="summary"><small>이번 달 총 금액</small><h2>'+won(total(mw))+'</h2><p>'+hours(mw).toFixed(1)+'시간 · '+mw.length+'회 근무</p></section>';
  html+='<section class="section"><div class="section-title">대상별 금액</div>';
  targets.forEach(function(t){var tw=targetWorks(t.id);html+=targetCard(t,tw)});
  html+='</section><section class="section"><div class="section-title">오늘 근무</div>';
  var today=dstr(new Date());var todayList=works.filter(function(w){return w.date===today});
  html+=todayList.length?todayList.map(workCard).join(''):'<div class="empty">오늘 근무가 없어요</div>';
  html+='</section>';
  $('view').innerHTML=html;
}
function targetCard(t,tw){return '<div class="card row"><div><div class="name"><span class="dot" style="background:'+t.color+'"></span>'+t.name+'</div><div class="sub">'+tw.length+'회 · '+hours(tw).toFixed(1)+'시간 · 시급 '+Number(t.wage).toLocaleString()+'원</div></div><div class="money">'+won(total(tw))+'</div></div>'}
function workCard(w){var t=getTarget(w.targetId)||{name:'삭제된 대상',color:'#999'};return '<div class="card row"><div><div class="name"><span class="dot" style="background:'+t.color+'"></span>'+t.name+'</div><div class="sub">'+w.date+' · '+w.start+'~'+w.end+' · 휴게 '+w.breakMin+'분</div></div><div class="money">'+won(pay(w))+'</div></div>'}
function renderCalendar(){
  var html='<section class="section" style="padding-top:18px"><div class="row"><button class="btn gray" onclick="now.setMonth(now.getMonth()-1);render()">이전달</button><button class="btn gray" onclick="now.setMonth(now.getMonth()+1);render()">다음달</button></div></section>';
  html+='<div class="calendar"><div class="week"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div><div class="days">';
  var first=new Date(now.getFullYear(),now.getMonth(),1);var start=new Date(first);start.setDate(1-first.getDay());
  for(var i=0;i<42;i++){var d=new Date(start);d.setDate(start.getDate()+i);var ds=dstr(d);var list=works.filter(function(w){return w.date===ds});html+='<div class="day" onclick="openAddWork(\''+ds+'\')"><div class="day-num">'+d.getDate()+'</div>';list.slice(0,2).forEach(function(w){var t=getTarget(w.targetId)||{};html+='<div class="pill" style="background:'+(t.color||'#999')+'">'+(t.name||'')+'</div>'});html+='</div>'}
  html+='</div></div>';$('view').innerHTML=html;
}
function renderPay(){var mw=monthWorks();var html='<section class="summary"><small>월별 정산</small><h2>'+won(total(mw))+'</h2><p>총 '+hours(mw).toFixed(1)+'시간</p></section><section class="section"><div class="section-title">급여 상세</div>';targets.forEach(function(t){html+=targetCard(t,targetWorks(t.id))});html+='</section><section class="section"><div class="section-title">근무 내역</div>';html+=mw.length?mw.map(workCard).join(''):'<div class="empty">근무 내역이 없어요</div>';html+='</section>';$('view').innerHTML=html}
function renderTargets(){var html='<section class="section" style="padding-top:18px"><button class="btn" onclick="openTarget()">대상 추가</button></section><section class="section"><div class="section-title">관리 대상</div>';targets.forEach(function(t){html+='<div class="card row"><div><div class="name"><span class="dot" style="background:'+t.color+'"></span>'+t.name+'</div><div class="sub">시급 '+Number(t.wage).toLocaleString()+'원 · 급여일 '+(t.payday||'-')+'일</div></div><button class="btn red" style="width:auto" onclick="delTarget(\''+t.id+'\')">삭제</button></div>'});html+='</section>';$('view').innerHTML=html}
function closeModal(mid){$(mid).classList.remove('show')}
function openTarget(){selectedColor=colorOptions[0];$('targetName').value='';$('targetWage').value='';$('targetPayday').value='';renderColors();$('targetModal').classList.add('show')}
function renderColors(){var html='';colorOptions.forEach(function(c){html+='<button type="button" class="color '+(c===selectedColor?'on':'')+'" style="background:'+c+'" onclick="selectedColor=\''+c+'\';renderColors()"></button>'});$('colors').innerHTML=html}
function openAddWork(date){if(targets.length===0){openTarget();return}var html='';targets.forEach(function(t){html+='<option value="'+t.id+'">'+t.name+'</option>'});$('workTarget').innerHTML=html;$('workDate').value=date||dstr(new Date());$('workStart').value='09:00';$('workEnd').value='18:00';$('workBreak').value='60';$('workWage').value=targets[0].wage;$('workTarget').onchange=function(){var t=getTarget(this.value);if(t)$('workWage').value=t.wage};$('workModal').classList.add('show')}
function saveTarget(e){e.preventDefault();targets.push({id:id(),name:$('targetName').value,wage:Number($('targetWage').value),payday:Number($('targetPayday').value||0),color:selectedColor});save();closeModal('targetModal');render()}
function saveWork(e){e.preventDefault();works.push({id:id(),targetId:$('workTarget').value,date:$('workDate').value,start:$('workStart').value,end:$('workEnd').value,breakMin:Number($('workBreak').value||0),wage:Number($('workWage').value)});save();closeModal('workModal');render()}
function delTarget(tid){if(!confirm('삭제할까요?'))return;targets=targets.filter(function(t){return t.id!==tid});works=works.filter(function(w){return w.targetId!==tid});save();render()}

load();
render();
</script>
</body>
</html>
